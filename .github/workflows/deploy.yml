name: Deploy Next.js to GitHub Pages

on:
  push:
    branches: ["main"] # Change to "master" if your default branch is named master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: ${{ hashFiles('package-lock.json') == '' && 'yarn' || 'npm' }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install dependencies
        run: ${{ hashFiles('package-lock.json') == '' && 'yarn install' || 'npm ci' }}

      - name: Build and Export Static Site
        run: ${{ hashFiles('package-lock.json') == '' && 'yarn build' || 'npm run build' }}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out # Next.js outputs static files into the ./out directory

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
